<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF-Tool mit Vorschau, Rotation & Drag-and-Drop</title>
    
    <!-- Load pdf-lib (for manipulation/merging) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <!-- Load pdf.js (for rendering previews) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 850px;
            margin: 20px auto;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        /* --- Areas --- */
        .file-input-area, .file-list-area, .actions-area {
            margin-bottom: 20px;
        }
         /* --- File Input / Drag & Drop Zone --- */
        .file-input-area {
            border: 2px dashed #ccc;
            padding: 30px 20px;
            border-radius: 8px;
            text-align: center;
            background-color: #fafafa;
            transition: background-color 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .file-input-area:hover, .file-input-area.dragover {
            background-color: #e6f7ff;
            border-color: #1890ff;
        }
        .file-input-area label {
            display: block;
            margin-bottom: 0;
            font-weight: normal;
            color: #555;
            cursor: pointer;
        }
        .file-input-area label strong {
            color: #1890ff;
        }
        
         /* --- File List --- */
        #fileList {
            list-style: none;
            padding: 0;
            border: 1px solid #eee;
            border-radius: 4px;
            max-height: 450px;
            overflow-y: auto;
        }
        #fileList li {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #fff;
            transition: background-color 0.2s;
            min-height: 100px;
        }
        #fileList li:last-child { border-bottom: none; }
        #fileList li:hover { background-color: #f9f9f9; }

        /* --- File Item Layout --- */
        .file-item-content {
            display: flex;
            align-items: center;
            flex-grow: 1;
            gap: 15px;
        }

        /* --- Preview --- */
        .preview-container {
            width: 80px;
            height: 100px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            position: relative;
            overflow: hidden;
        }
         .preview-canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
         }
         .preview-loading {
            font-size: 0.8em;
            color: #888;
         }

        /* --- File Info & Controls --- */
        .file-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            min-width: 0;
        }
        .file-info {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            word-break: break-all;
        }
        .file-info input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
            flex-shrink: 0;
        }
        .file-name {
             flex-grow: 1;
             overflow: hidden;
             text-overflow: ellipsis;
             white-space: nowrap;
        }

        /* --- Rotation Controls --- */
        .rotate-controls button {
            margin-right: 5px;
            padding: 3px 6px;
            font-size: 0.8em;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #f8f8f8;
            border-radius: 3px;
        }
        .rotate-controls button:hover {
            background-color: #eee;
        }

        /* --- File Actions (Download/Remove) --- */
        .file-actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .file-actions button {
            padding: 5px 10px;
            font-size: 0.9em;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background-color 0.2s;
            min-width: 100px;
            text-align: center;
        }
        .download-btn { background-color: #5cb85c; color: white; }
        .download-btn:hover { background-color: #4cae4c; }
        .remove-btn { background-color: #d9534f; color: white; }
        .remove-btn:hover { background-color: #c9302c; }

        /* --- Main Action Button --- */
        .main-action-btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            background-color: #0275d8;
            color: white;
            border: none;
            border-radius: 4px;
            transition: background-color 0.2s;
            margin-bottom: 10px;
        }
        .main-action-btn:hover { background-color: #025aa5; }
        .main-action-btn:disabled { background-color: #cccccc; cursor: not-allowed; }

        /* --- Status & Download Link --- */
        #status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        .status-info { background-color: #eef; color: #33a; }
        .status-success { background-color: #dff0d8; color: #3c763d; }
        .status-error { background-color: #f2dede; color: #a94442; }
        #mergedLinkContainer { margin-top: 15px; text-align: center; }
        #mergedLinkContainer a { display: inline-block; padding: 10px 20px; background-color: #5cb85c; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
        #mergedLinkContainer a:hover { background-color: #4cae4c; }

    </style>
</head>
<body>
    <div class="container">
        <h1>PDF-Tool mit Vorschau, Rotation & Drag-and-Drop</h1>

        <!-- Drag & Drop Zone -->
        <div class="file-input-area" id="dropZone">
            <label for="pdfFiles">
                <strong>PDF-Dateien hierher ziehen</strong> oder hier klicken, um Dateien auszuwählen
            </label>
            <input type="file" id="pdfFiles" accept=".pdf" multiple style="display: none;">
        </div>

        <div class="file-list-area">
            <label>Geladene Dateien:</label>
            <ul id="fileList">
                <!-- File items will be added here -->
            </ul>
        </div>

        <div class="actions-area">
            <button id="mergeBtn" class="main-action-btn" disabled>Ausgewählte PDFs zusammenführen</button>
        </div>

        <div id="status"></div>
        <div id="mergedLinkContainer"></div>

    </div>

    <script>
        // Access pdf-lib functions
        const { PDFDocument, degrees } = PDFLib;

        // Configure pdf.js worker
        if (window.pdfjsLib) {
            let workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            if (window.location.protocol === 'file:') {
                 console.warn("pdf.js-Worker lädt unter file:// eventuell nicht korrekt. Nutzen Sie ggf. einen lokalen Webserver.");
            }
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = workerSrc;
        } else {
             console.error("pdf.js Bibliothek nicht geladen!");
             alert("Fehler: pdf.js konnte nicht geladen werden.");
        }


        const fileInput = document.getElementById('pdfFiles');
        const dropZone = document.getElementById('dropZone');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        const statusDiv = document.getElementById('status');
        const mergedLinkContainer = document.getElementById('mergedLinkContainer');

        let loadedFiles = []; // Array für Datei-Objekte, Status und Rotation

        // File-Input Event Listener
        fileInput.addEventListener('change', handleFileSelect);
        mergeBtn.addEventListener('click', handleMerge);

        // Drag & Drop Event Listener
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            handleFiles(files);
            event.target.value = null; // Zurücksetzen für erneute Auswahl derselben Datei
        }

        function handleFiles(files) {
            if (!files.length) return;

            statusDiv.textContent = '';
            mergedLinkContainer.innerHTML = '';

            const newFiles = [];

            for (const file of files) {
                if (file.type !== 'application/pdf') {
                    updateStatus(`Nicht-PDF-Datei übersprungen: ${file.name}`, 'error');
                    continue;
                }
                if (loadedFiles.some(f => f.file.name === file.name)) {
                     updateStatus(`Datei bereits geladen: ${file.name}`, 'info');
                     continue;
                }

                const fileId = `file-${Date.now()}-${Math.random().toString(16).slice(2)}`;
                const fileData = {
                    id: fileId,
                    file: file,
                    selected: true,
                    rotation: 0 // Benutzerdefinierter Rotations-Offset
                };
                loadedFiles.push(fileData);
                newFiles.push(fileData);
            }

            newFiles.forEach(fileData => {
                addFileToList(fileData);
                setTimeout(() => renderPreview(fileData.id), 0);
            });

            updateMergeButtonState();
        }

        function addFileToList(fileData) {
            const listItem = document.createElement('li');
            listItem.id = fileData.id;

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('file-item-content');

            // Preview Area
            const previewContainer = document.createElement('div');
            previewContainer.classList.add('preview-container');
            const previewCanvas = document.createElement('canvas');
            previewCanvas.id = `canvas-${fileData.id}`;
            previewCanvas.classList.add('preview-canvas');
            const loadingText = document.createElement('span');
            loadingText.textContent = 'Lädt...';
            loadingText.classList.add('preview-loading');
            previewContainer.appendChild(loadingText);
            previewContainer.appendChild(previewCanvas);

            // File Details (Checkbox, Name, Rotate Buttons)
            const detailsDiv = document.createElement('div');
            detailsDiv.classList.add('file-details');

            const fileInfoDiv = document.createElement('div');
            fileInfoDiv.classList.add('file-info');

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = fileData.selected;
            checkbox.addEventListener('change', (e) => {
                fileData.selected = e.target.checked;
                updateMergeButtonState();
            });

            const fileNameSpan = document.createElement('span');
            fileNameSpan.textContent = fileData.file.name;
            fileNameSpan.title = fileData.file.name;
            fileNameSpan.classList.add('file-name');

            fileInfoDiv.appendChild(checkbox);
            fileInfoDiv.appendChild(fileNameSpan);

            // Rotation Controls
            const rotateDiv = document.createElement('div');
            rotateDiv.classList.add('rotate-controls');

            const rotateCWBtn = document.createElement('button');
            rotateCWBtn.textContent = '90° Rechts';
            rotateCWBtn.title = 'Im Uhrzeigersinn drehen';
            rotateCWBtn.addEventListener('click', () => rotateFile(fileData.id, 90));

            const rotateCCWBtn = document.createElement('button');
            rotateCCWBtn.textContent = '90° Links';
            rotateCCWBtn.title = 'Gegen den Uhrzeigersinn drehen';
            rotateCCWBtn.addEventListener('click', () => rotateFile(fileData.id, -90));

            rotateDiv.appendChild(rotateCCWBtn);
            rotateDiv.appendChild(rotateCWBtn);

            detailsDiv.appendChild(fileInfoDiv);
            detailsDiv.appendChild(rotateDiv);

            // Assemble Content Div
            contentDiv.appendChild(previewContainer);
            contentDiv.appendChild(detailsDiv);

            // File Actions (Download/Remove)
            const fileActionsDiv = document.createElement('div');
            fileActionsDiv.classList.add('file-actions');

            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = 'Download';
            downloadBtn.classList.add('download-btn');
            downloadBtn.addEventListener('click', () => downloadSingleFile(fileData));

            const removeBtn = document.createElement('button');
            removeBtn.textContent = 'Entfernen';
            removeBtn.classList.add('remove-btn');
            removeBtn.addEventListener('click', () => removeFile(fileData.id));

            fileActionsDiv.appendChild(downloadBtn);
            fileActionsDiv.appendChild(removeBtn);

            // Add parts to list item
            listItem.appendChild(contentDiv);
            listItem.appendChild(fileActionsDiv);
            fileList.appendChild(listItem);
        }

        async function renderPreview(fileId) {
            const fileData = loadedFiles.find(f => f.id === fileId);
            if (!fileData || !window.pdfjsLib) return;

            const canvas = document.getElementById(`canvas-${fileId}`);
            const container = canvas.parentElement;
            const loadingIndicator = container.querySelector('.preview-loading');

            if (!canvas || !container) return;

            const ctx = canvas.getContext('2d');

            try {
                 if (loadingIndicator) loadingIndicator.style.display = 'inline';
                 canvas.style.display = 'none';

                 // Vorheriges Rendering löschen
                 ctx.clearRect(0, 0, canvas.width, canvas.height);

                const arrayBuffer = await fileData.file.arrayBuffer();
                const pdfDoc = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdfDoc.getPage(1); // Erste Seite für die Vorschau holen

                // Die inhärente PDF-Rotation berücksichtigen und mit der Benutzer-Rotation addieren
                const pageInherentRotation = page.rotate || 0;
                const finalRotation = (pageInherentRotation + fileData.rotation) % 360;

                const desiredWidth = 80; // Vorschau-Breite
                
                // Vorab-Viewport berechnen, um die Dimensionen nach der Rotation zu ermitteln
                const tempViewport = page.getViewport({ scale: 1, rotation: finalRotation });
                
                // Skalierung basierend auf der tatsächlichen, rotierten Breite berechnen
                const scale = desiredWidth / tempViewport.width;
                const scaledViewport = page.getViewport({ scale: scale, rotation: finalRotation });

                canvas.height = scaledViewport.height;
                canvas.width = scaledViewport.width;

                // Falls die rotierte Höhe die Containerhöhe (100px) überschreitet, nachkorrigieren
                if (scaledViewport.height > container.clientHeight) {
                    const heightScale = container.clientHeight / scaledViewport.height;
                    const adjustedViewport = page.getViewport({ scale: scale * heightScale, rotation: finalRotation });
                    canvas.height = adjustedViewport.height;
                    canvas.width = adjustedViewport.width;
                     await page.render({ canvasContext: ctx, viewport: adjustedViewport }).promise;
                } else {
                     await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
                }

                 if (loadingIndicator) loadingIndicator.style.display = 'none';
                 canvas.style.display = 'block';

            } catch (error) {
                console.error(`Fehler bei der Vorschau-Generierung für ${fileData.file.name}:`, error);
                 if (loadingIndicator) loadingIndicator.textContent = 'Vorschau-Fehler';
                 else container.innerHTML = '<span style="font-size:0.8em; color:red;">Fehler</span>';
            }
        }


        function rotateFile(fileId, angle) {
            const fileData = loadedFiles.find(f => f.id === fileId);
            if (!fileData) return;

            // Neuen Benutzer-Rotations-Offset berechnen
            let newRotation = (fileData.rotation + angle) % 360;
            if (newRotation < 0) {
                newRotation += 360;
            }
            fileData.rotation = newRotation;

            // Vorschau umgehend aktualisieren
            renderPreview(fileId);
            updateStatus(`Rotation geändert für ${fileData.file.name}. Zusätzlicher Winkel: ${newRotation}°`, 'info');
        }


        function removeFile(fileId) {
            loadedFiles = loadedFiles.filter(f => f.id !== fileId);
            const listItem = document.getElementById(fileId);
            if (listItem) {
                listItem.remove();
            }
            updateMergeButtonState();
            if (loadedFiles.length === 0) {
                statusDiv.textContent = '';
                mergedLinkContainer.innerHTML = '';
            } else {
                 updateStatus(`Datei entfernt.`, 'info');
            }
        }

        function downloadSingleFile(fileData) {
            try {
                const url = URL.createObjectURL(fileData.file);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileData.file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                updateStatus(`Original heruntergeladen: ${fileData.file.name}`, 'success');
            } catch (error) {
                console.error("Download-Fehler:", error);
                updateStatus(`Fehler beim Herunterladen von ${fileData.file.name}: ${error.message}`, 'error');
            }
        }

        function updateMergeButtonState() {
            const selectedFilesCount = loadedFiles.filter(f => f.selected).length;
            mergeBtn.disabled = selectedFilesCount < 1;
        }

        async function handleMerge() {
            const filesToMerge = loadedFiles.filter(f => f.selected);

            if (filesToMerge.length === 0) {
                 updateStatus('Bitte wählen Sie mindestens eine PDF-Datei aus.', 'error');
                 return;
            }

            updateStatus('PDFs werden verarbeitet... Bitte warten.', 'info');
            mergeBtn.disabled = true;
            mergedLinkContainer.innerHTML = '';

            try {
                const mergedPdf = await PDFDocument.create();

                for (const fileData of filesToMerge) {
                    updateStatus(`Verarbeite: ${fileData.file.name}...`, 'info');
                    const arrayBuffer = await fileData.file.arrayBuffer();
                    let pdfToCopy;
                    try {
                         pdfToCopy = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                    } catch (loadError){
                         console.error(`Fehler beim Laden von ${fileData.file.name}:`, loadError);
                         updateStatus(`Fehler beim Laden von ${fileData.file.name}: ${loadError.message}`, 'error');
                         continue;
                    }

                    if (pdfToCopy.isEncrypted) {
                         updateStatus(`Verschlüsselte Datei übersprungen: ${fileData.file.name}.`, 'error');
                         continue;
                    }

                    const pageIndices = pdfToCopy.getPageIndices();

                    // Wenn eine zusätzliche Rotation angewendet werden soll
                    if (fileData.rotation !== 0) {
                        updateStatus(`Wende ${fileData.rotation}° Rotation auf ${fileData.file.name} an...`, 'info');
                        pageIndices.forEach(index => {
                            const page = pdfToCopy.getPage(index);
                            
                            // Inhärente Rotation aus pdf-lib auslesen
                            const rotationObj = page.getRotation();
                            const currentRotation = rotationObj ? (rotationObj.angle || 0) : 0;
                            
                            let finalRotation = (currentRotation + fileData.rotation) % 360;
                            if (finalRotation < 0) finalRotation += 360;
                            
                            page.setRotation(degrees(finalRotation));
                        });
                    }

                    // Seiten kopieren
                    const copiedPages = await mergedPdf.copyPages(pdfToCopy, pageIndices);
                    copiedPages.forEach((page) => {
                        mergedPdf.addPage(page);
                    });
                    updateStatus(`${pageIndices.length} Seiten aus ${fileData.file.name} hinzugefügt.`, 'info');
                }

                if (mergedPdf.getPageCount() === 0) {
                    updateStatus('Es wurden keine Seiten hinzugefügt. Überprüfen Sie, ob Dateien übersprungen wurden.', 'error');
                    updateMergeButtonState();
                    return;
                }

                const mergedPdfBytes = await mergedPdf.save();

                displayDownloadLink(mergedPdfBytes, 'zusammengefuegtes_dokument.pdf');
                updateStatus(`Erfolgreich verarbeitet. Klicken Sie auf den Link unten, um die Datei herunterzuladen.`, 'success');

            } catch (error) {
                console.error("Fehler beim Zusammenführen der PDFs:", error);
                updateStatus(`Fehler beim Zusammenführen: ${error.message}`, 'error');
            } finally {
                 updateMergeButtonState();
            }
        }

        function displayDownloadLink(bytes, filename) {
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            mergedLinkContainer.innerHTML = '';
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.textContent = `Zusammengeführte PDF herunterladen (${(bytes.length / 1024 / 1024).toFixed(2)} MB)`;
            mergedLinkContainer.appendChild(a);
        }

        function updateStatus(message, type = 'info') {
            statusDiv.textContent = message;
            statusDiv.className = `status-${type}`;
        }

        // Initialer Zustand
        updateMergeButtonState();

    </script>
</body>
</html>
