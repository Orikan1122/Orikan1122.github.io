<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Excel Converter</title>
    <!-- SheetJS for standard binary support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #059669; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .drop-zone { border: 2px dashed #cbd5e1; padding: 3rem 1rem; border-radius: 8px; cursor: pointer; margin: 1.5rem 0; transition: all 0.2s; background: #fff; }
        .drop-zone:hover { border-color: var(--primary); background: #eff6ff; }
        .file-card { display: none; background: #f1f5f9; padding: 1rem; border-radius: 8px; text-align: left; margin-bottom: 1rem; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #334155; color: white; margin-left: 8px; text-transform: uppercase; }
        button { background: var(--success); color: white; border: none; width: 100%; padding: 0.8rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; display: none; }
        button:hover { background: #047857; }
        #status { font-size: 0.9rem; color: #64748b; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">Smart XLS Converter</h2>
    <p style="color: #64748b;">Supports standard binary & MHTML exports</p>

    <div class="drop-zone" id="dropZone">
        <p id="prompt"><strong>Click to upload</strong> or drag .xls here</p>
        <input type="file" id="fileInput" accept=".xls,.xlsx" style="display:none" />
    </div>

    <div class="file-card" id="fileCard">
        <div style="font-weight: 600; margin-bottom: 4px;">File: <span id="name"></span> <span id="typeBadge" class="badge"></span></div>
        <div style="font-size: 0.85rem; color: #475569;" id="detail"></div>
    </div>

    <button id="dlBtn">Download as CSV</button>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const dlBtn = document.getElementById('dlBtn');
    const fileCard = document.getElementById('fileCard');
    const status = document.getElementById('status');

    let processedWorkbook = null;
    let fileName = "";

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    
    // Drag & Drop
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#2563eb"; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = "#cbd5e1"; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

    async function handleFile(file) {
        if (!file) return;
        fileName = file.name.replace(/\.[^/.]+$/, "");
        document.getElementById('name').textContent = file.name;
        status.textContent = "Analyzing file...";
        
        const arrayBuffer = await file.arrayBuffer();
        const uint8 = new Uint8Array(arrayBuffer);
        
        // --- REACTIVE RECOGNITION ---
        // We peek at the first few bytes to see what it really is
        const header = new TextDecoder().decode(uint8.slice(0, 1000));
        
        try {
            if (header.includes("MIME-Version") || header.includes("<html")) {
                // IT'S MHTML / HTML
                document.getElementById('typeBadge').textContent = "Legacy Web Export";
                processMhtml(new TextDecoder().decode(uint8));
            } else {
                // IT'S BINARY (Standard XLS or XLSX)
                document.getElementById('typeBadge').textContent = "Standard Excel";
                processBinary(uint8);
            }
        } catch (err) {
            status.textContent = "❌ Error: " + err.message;
        }
    }

    function processBinary(data) {
        processedWorkbook = XLSX.read(data, {type: 'array'});
        showSuccess(`Standard Excel detected. Found ${processedWorkbook.SheetNames.length} sheet(s).`);
    }

    function processMhtml(text) {
        // 1. Decode Quoted-Printable symbols (=3D, soft breaks)
        const cleanHtml = text
            .replace(/=\r?\n/g, "") // remove soft line breaks
            .replace(/=[0-9A-F]{2}/gi, match => String.fromCharCode(parseInt(match.slice(1), 16)));
        
        // 2. Extract tables
        const parser = new DOMParser();
        const doc = parser.parseFromString(cleanHtml, 'text/html');
        const tables = doc.querySelectorAll('table');
        
        if (tables.length === 0) throw new Error("No data tables found in file.");

        // 3. Merge tables into one sheet using SheetJS
        // We iterate all tables and append them to a single worksheet
        const masterSheet = XLSX.utils.table_to_sheet(tables[0]);
        
        for (let i = 1; i < tables.length; i++) {
            // Add a spacer row between tables
            const range = XLSX.utils.decode_range(masterSheet['!ref']);
            const nextRow = range.e.r + 2; 
            XLSX.utils.sheet_add_dom(masterSheet, tables[i], {origin: nextRow});
        }

        processedWorkbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(processedWorkbook, masterSheet, "Extracted Data");
        
        showSuccess(`MHTML format detected. ${tables.length} tables merged.`);
    }

    function showSuccess(msg) {
        fileCard.style.display = "block";
        dlBtn.style.display = "block";
        document.getElementById('detail').textContent = msg;
        status.textContent = "Ready for conversion.";
    }

    dlBtn.onclick = () => {
        if (!processedWorkbook) return;
        
        // Export the first sheet
        const firstSheetName = processedWorkbook.SheetNames[0];
        const worksheet = processedWorkbook.Sheets[firstSheetName];
        const csv = XLSX.utils.sheet_to_csv(worksheet);
        
        // Add UTF-8 BOM for Excel compatibility
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${fileName}_converted.csv`;
        a.click();
        status.textContent = "✅ Conversion Complete!";
    };
</script>

</body>
</html>
