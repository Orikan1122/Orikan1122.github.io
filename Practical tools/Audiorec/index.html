<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser/System Audio Recorder</title>
    <style>
        :root {
            --primary-color: #673AB7; /* Changed to purple for system audio */
            --danger-color: #f44336;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .recorder-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #222;
        }
        
        p.instructions {
            font-size: 13px;
            color: #555;
            background: #fff3cd;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ffeeba;
            text-align: left;
        }

        .status {
            margin: 15px 0;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            height: 20px;
        }

        .recording-pulse {
            color: var(--danger-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #recordBtn {
            background-color: var(--primary-color);
        }

        #recordBtn:hover:not(:disabled) {
            background-color: #512da8;
        }

        #stopBtn {
            background-color: var(--danger-color);
        }

        #stopBtn:hover:not(:disabled) {
            background-color: #da190b;
        }

        .playback-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        audio {
            width: 100%;
            outline: none;
        }

        .download-btn {
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .download-btn:hover {
            background-color: #0b7dda;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="recorder-card">
        <h1>Browser Audio Recorder</h1>
        <p class="instructions">
            <b>Important:</b> When prompted, select a Browser Tab or your Screen, and make sure to toggle <b>"Share tab audio"</b> or <b>"Share system audio"</b> before clicking Share.
        </p>

        <div id="status" class="status">Ready to record</div>
        
        <div class="controls">
            <button id="recordBtn">🎧 Start Recording</button>
            <button id="stopBtn" disabled>⏹ Stop</button>
        </div>

        <div class="playback-zone">
            <audio id="audioPlayback" controls class="hidden"></audio>
            <a id="downloadBtn" class="download-btn hidden" download="system_audio.wav">⬇️ Download WAV Audio</a>
        </div>
    </div>

    <script>
        let audioContext;
        let scriptProcessor;
        let mediaStreamSource;
        let captureStream;
        
        let leftChannel = [];
        let rightChannel = [];
        let recordingLength = 0;
        let isRecording = false;

        // Grab DOM Elements
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('status');
        const audioPlayback = document.getElementById('audioPlayback');
        const downloadBtn = document.getElementById('downloadBtn');

        recordBtn.addEventListener('click', async () => {
            try {
                // Screen/Tab Audio anfragen
                captureStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true, 
                    audio: true 
                });
                
                const audioTracks = captureStream.getAudioTracks();
                if (audioTracks.length === 0) {
                    captureStream.getTracks().forEach(track => track.stop());
                    alert("No audio captured! Please make sure to check 'Share tab audio' or 'Share system audio' in the popup.");
                    return;
                }

                const audioOnlyStream = new MediaStream([audioTracks[0]]);
                
                // AudioContext initialisieren
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                mediaStreamSource = audioContext.createMediaStreamSource(audioOnlyStream);
                
                // ScriptProcessor für direktes Erfassen der Audiodaten (Stereo, 4096 Buffer)
                scriptProcessor = audioContext.createScriptProcessor(4096, 2, 2);
                
                leftChannel = [];
                rightChannel = [];
                recordingLength = 0;
                isRecording = true;

                scriptProcessor.onaudioprocess = (e) => {
                    if (!isRecording) return;
                    const left = e.inputBuffer.getChannelData(0);
                    const right = e.inputBuffer.getChannelData(1);
                    
                    // Kopie der Audiodaten sichern (da der Buffer wiederverwendet wird)
                    leftChannel.push(new Float32Array(left));
                    rightChannel.push(new Float32Array(right));
                    recordingLength += left.length;
                };

                // Knoten verbinden
                mediaStreamSource.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);

                // Automatischer Stopp, wenn der Nutzer die Freigabe über das Browser-Banner beendet
                captureStream.getVideoTracks()[0].onended = () => {
                     stopRecording();
                };

                // UI-Zustand anpassen
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                statusText.innerText = "🔴 Recording Browser Audio directly to WAV...";
                statusText.classList.add('recording-pulse');

                audioPlayback.classList.add('hidden');
                downloadBtn.classList.add('hidden');

            } catch (error) {
                console.error("Error capturing audio:", error);
                statusText.innerText = "Error: Screen/Audio capture cancelled.";
                statusText.style.color = "var(--danger-color)";
            }
        });

        // Event-Listener für manuellen Stopp
        stopBtn.addEventListener('click', () => {
            stopRecording();
        });

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;

            // Verbindungen trennen
            if (scriptProcessor) scriptProcessor.disconnect();
            if (mediaStreamSource) mediaStreamSource.disconnect();
            if (audioContext) audioContext.close();

            // Puffer zusammenführen
            const leftBuffer = mergeBuffers(leftChannel, recordingLength);
            const rightBuffer = mergeBuffers(rightChannel, recordingLength);

            // WAV generieren
            const sampleRate = audioContext ? audioContext.sampleRate : 44100;
            const wavBlob = bufferToWav(leftBuffer, rightBuffer, sampleRate);
            const audioUrl = URL.createObjectURL(wavBlob);

            // Audio-Element einrichten
            audioPlayback.src = audioUrl;
            audioPlayback.classList.remove('hidden');

            // Download-Button einrichten
            downloadBtn.href = audioUrl;
            downloadBtn.download = `browser_audio_${new Date().getTime()}.wav`;
            downloadBtn.classList.remove('hidden');
            downloadBtn.innerText = "⬇️ Download WAV Audio";

            // Physische Spuren schließen
            if (captureStream) {
                captureStream.getTracks().forEach(track => track.stop());
            }

            // UI zurücksetzen
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.innerText = "Recording saved as WAV. Ready to play or download.";
            statusText.classList.remove('recording-pulse');
        }

        function mergeBuffers(channelBuffer, length) {
            const result = new Float32Array(length);
            let offset = 0;
            for (let i = 0; i < channelBuffer.length; i++) {
                const buffer = channelBuffer[i];
                result.set(buffer, offset);
                offset += buffer.length;
            }
            return result;
        }

        function bufferToWav(left, right, sampleRate) {
            const numOfChan = 2; // Stereo
            const numSamples = left.length;
            const length = numSamples * numOfChan * 2 + 44;
            const bufferArray = new ArrayBuffer(length);
            const view = new DataView(bufferArray);

            let offset = 0;

            function writeString(str) {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset++, str.charCodeAt(i));
                }
            }

            // RIFF-Header
            writeString("RIFF");
            view.setUint32(offset, length - 8, true); offset += 4;
            writeString("WAVE");
            
            // Format-Chunk
            writeString("fmt ");
            view.setUint32(offset, 16, true); offset += 4;
            view.setUint16(offset, 1, true); offset += 2; // PCM Format
            view.setUint16(offset, numOfChan, true); offset += 2;
            view.setUint32(offset, sampleRate, true); offset += 4;
            view.setUint32(offset, sampleRate * 2 * numOfChan, true); offset += 4;
            view.setUint16(offset, numOfChan * 2, true); offset += 2;
            view.setUint16(offset, 16, true); offset += 2; // 16-bit

            // Data-Chunk
            writeString("data");
            view.setUint32(offset, length - offset - 4, true); offset += 4;

            // Audiodaten verschachteln und konvertieren (Float32 -> Int16)
            for (let i = 0; i < numSamples; i++) {
                // Linker Kanal
                let s0 = Math.max(-1, Math.min(1, left[i]));
                let sample0 = s0 < 0 ? s0 * 0x8000 : s0 * 0x7FFF;
                view.setInt16(offset, sample0, true);
                offset += 2;

                // Rechter Kanal
                let s1 = Math.max(-1, Math.min(1, right[i]));
                let sample1 = s1 < 0 ? s1 * 0x8000 : s1 * 0x7FFF;
                view.setInt16(offset, sample1, true);
                offset += 2;
            }

            return new Blob([view], { type: "audio/wav" });
        }
    </script>
</body>
</html>
